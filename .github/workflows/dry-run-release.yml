name: Dry run release

on:
  pull_request:

jobs:
  dry-run-release:
    name: dry-run-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js, pnpm # and Nx cache
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Dry run release
        env:
          RELIZY_GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELIZY_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELIZY_TWITTER_API_KEY: test
          RELIZY_TWITTER_API_KEY_SECRET: test
          RELIZY_TWITTER_ACCESS_TOKEN: test
          RELIZY_TWITTER_ACCESS_TOKEN_SECRET: test
        run: pnpm relizy release --yes --dry-run --log-level debug --no-ai
